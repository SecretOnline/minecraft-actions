name: Setup Minecraft client
description: >-
  Downloads a Minecraft Java Edition client (vanilla, Fabric, or NeoForge - jar,
  libraries, assets, log4j config) and writes a launch-config.json describing how to
  launch it, ready to be started by the run-mc-client action. This client is only ever
  intended to join a singleplayer world it owns or a server with online-mode=false (like
  this repo's own setup-mc-server default) - there is no real Microsoft/Xbox
  authentication here, just fabricated offline-mode credentials supplied at
  run-mc-client time. Libraries and assets are cached across runs via actions/cache
  (keyed by Minecraft version+loader / asset index id respectively) since assets in
  particular can be several hundred MB; a cache miss falls back to downloading, so this
  works fine on the first run or if the cache is unavailable (e.g. local `act` runs
  without --cache-server-path). When loader is "neoforge", this runs the real NeoForge
  installer with `java`, so a JDK must already be on PATH (e.g. via actions/setup-java)
  before this action runs.

inputs:
  minecraft-version:
    description: Minecraft version to run. If not supplied, falls back to latest release.
    required: false
  client-directory:
    description: Directory to install the client into.
    required: false
    default: "."
  loader:
    description: Client type to install. One of "vanilla", "fabric", or "neoforge".
    required: false
    default: vanilla
  fabric-loader-version:
    description: >-
      Fabric Loader version to use when loader is "fabric". If not supplied, falls back
      to the latest stable version.
    required: false
  neoforge-version:
    description: >-
      NeoForge version to use when loader is "neoforge". If not supplied, falls back to
      the latest stable version for the resolved Minecraft version.
    required: false
  asset-download-strategy:
    description: >-
      "full" downloads every asset object referenced by the version's asset index
      (matches what the real launcher does; can be several hundred MB but is the safe
      default). "skip" downloads only the asset index and none of the objects, for
      faster CI - this is an unverified gamble on whether the client tolerates a fully
      empty assets/objects directory, so treat it as experimental.
    required: false
    default: full
  download-concurrency:
    description: >-
      Maximum number of libraries/asset objects to download in parallel. Kept modest by
      default to avoid hammering Mojang's CDN.
    required: false
    default: "8"
  client-options:
    description: >-
      Extra options.txt lines ("key:value", one per line - note the colon, options.txt's
      own format, unlike server.properties' "=") to apply on top of the defaults that
      skip first-launch UI (skipMultiplayerWarning:true, onboardAccessibility:false,
      joinedFirstServer:true, tutorialStep:none) which would otherwise block a headless
      client from ever reaching a joinable state.
    required: false

outputs:
  client-directory:
    description: Directory the client was installed into
  minecraft-version:
    description: The resolved Minecraft version
  fabric-loader-version:
    description: The resolved Fabric Loader version (only set when loader is "fabric")
  neoforge-version:
    description: The resolved NeoForge version (only set when loader is "neoforge")

runs:
  using: node24
  main: dist/index.js
