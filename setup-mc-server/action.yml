name: Setup Minecraft server
description: >-
  Downloads a vanilla Minecraft server jar and writes eula.txt and server.properties,
  ready to be started by the run-mc-server action.

inputs:
  minecraft-version:
    description: Minecraft version to run. If not supplied, falls back to latest release.
    required: false
  user-agent:
    description: User-Agent string for HTTP requests.
    required: true
  server-directory:
    description: Directory to install the server into.
    required: false
    default: "."
  accept-eula:
    description: >-
      Must be set to "true" to acknowledge the Minecraft EULA (https://aka.ms/MinecraftEULA)
      on the user's behalf.
    required: true
  server-properties:
    description: >-
      Extra server.properties lines ("key=value", one per line) to apply on top of
      the CI-friendly defaults (online-mode=false, white-list=false, enable-rcon=true).
    required: false

outputs:
  server-directory:
    description: Directory the server was installed into
  minecraft-version:
    description: The resolved Minecraft version

runs:
  using: node24
  main: dist/index.js
