name: Node auto-update

on:
  schedule:
    # First day of the month.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      node-major-version:
        description: >-
          Major Node.js version to update to (e.g. 24). If not set, uses the
          latest LTS version. GitHub Actions runners only support specific
          major versions for `using: nodeNN`, so pin this when the latest LTS
          isn't supported yet.
        required: false
        type: string

jobs:
  update-node:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update schema
        id: node-version
        env:
          MAJOR_FILTER: ${{ inputs.node-major-version }}
        run: |
          previous_major=$(sed -E 's/^v?([0-9]+).*/\1/' .node-version)
          if [ -z "$MAJOR_FILTER" ]; then
            MAJOR_FILTER="$previous_major"
          fi

          latest=$(curl -s https://nodejs.org/dist/index.json | jq -r --arg major "$MAJOR_FILTER" 'map(select(.lts and ((.version | ltrimstr("v") | split(".")[0]) == $major)))[0].version' | sed 's/v//')
          major=$(echo "$latest" | cut -d. -f1)

          echo "latest=$latest" >> $GITHUB_OUTPUT
          echo "major=$major" >> $GITHUB_OUTPUT
          echo "previous-major=$previous_major" >> $GITHUB_OUTPUT

      - name: Update .node-version
        run: echo "v${{ steps.node-version.outputs.latest }}" > .node-version

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Update @types/node package
        if: hashFiles('tsconfig.json') != ''
        run: npm install --save-dev @types/node@${{ steps.node-version.outputs.major }}

      - name: Update action.yml runtime versions
        run: |
          major="${{ steps.node-version.outputs.major }}"
          git ls-tree -r --name-only HEAD | grep -E '(^|/)action\.yml$' | while read -r file; do
            sed -i -E "s/using: node[0-9]+/using: node${major}/" "$file"
          done

      - name: Bump self-referenced action major versions in READMEs
        # A Node major version bump is a breaking change for consumers (GitHub
        # Actions runners only support specific `using: nodeNN` values), so it
        # forces a major version bump of these actions too. Reflect that here
        # by bumping the `@vN` self-references in the READMEs, so the PR makes
        # clear that the next release from this branch must be a major version.
        id: readme-bump
        if: steps.node-version.outputs.major != steps.node-version.outputs.previous-major
        env:
          REPO: ${{ github.repository }}
        run: |
          current=$(git ls-files '*.md' | xargs grep -ohE "${REPO}/[A-Za-z0-9._/-]+@v[0-9]+" 2>/dev/null | sed -E 's/.*@v//' | sort -un | tail -1)
          if [ -z "$current" ]; then
            echo "No self-referenced action versions found in READMEs, skipping."
            exit 0
          fi
          next=$((current + 1))
          echo "Bumping self-referenced action version from v$current to v$next (Node major version changed)"
          git ls-files '*.md' | xargs sed -i -E "s#(${REPO}/[A-Za-z0-9._/-]+@v)${current}#\1${next}#g"

          {
            echo "note<<EOF"
            echo "> [!IMPORTANT]"
            echo "> This bumps the Node major version from ${{ steps.node-version.outputs.previous-major }} to ${{ steps.node-version.outputs.major }}, which is a breaking change for consumers (GitHub Actions runners only support specific \`using: nodeNN\` values). README self-references have been bumped from \`@v${current}\` to \`@v${next}\` accordingly â€” the next release from this branch must use a major version bump (\`v${next}.0.0\`)."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add changelog entry for Node major bump
        if: steps.node-version.outputs.major != steps.node-version.outputs.previous-major
        env:
          MAJOR: ${{ steps.node-version.outputs.major }}
        run: |
          node - <<'JS'
          const fs = require("fs");

          const entry = `- Updated Node to v${process.env.MAJOR}`;
          const path = "CHANGELOG.md";
          const text = fs.readFileSync(path, "utf8");

          const start = /^## Unreleased.*$/m.exec(text);
          const rest = text.slice(start.index + start[0].length);
          const nextHeading = /^## (?!Unreleased)/m.exec(rest);
          const end = start.index + start[0].length + (nextHeading ? nextHeading.index : rest.length);

          let block = text.slice(start.index + start[0].length, end);

          if (/^### Updated$/m.test(block)) {
            block = block.replace(/(^### Updated\n)(\n)?/m, (_, heading, blank) => `${heading}${blank || ""}${entry}\n`);
          } else {
            block = `\n\n### Updated\n\n${entry}\n${block.replace(/^\n+/, "")}`;
          }

          block = block.replace(/\n+$/, "") + "\n\n";
          block = block.replace(/\n{3,}/g, "\n\n");

          fs.writeFileSync(path, text.slice(0, start.index + start[0].length) + block + text.slice(end));
          JS

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            .node-version
            package.json
            package-lock.json
            **/action.yml
            **/*.md
            CHANGELOG.md
          commit-message: "[Auto] Update Node version"
          branch: auto-update/node
          delete-branch: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "[Auto] Update script Node version"
          body: |
            Automatic update for the version of Node being used.

            ${{ steps.readme-bump.outputs.note }}
