name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit test
        run: npm test

      - name: Upload built actions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            get-test-matrix/dist
            get-update-versions/dist
            setup-mod-gradle/resolve-java/dist
            setup-mc-server/dist
            run-mc-server/dist
            setup-mc-client/dist
            run-mc-client/dist

  test-version-actions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Run get-test-matrix against fixture (1.x scheme)
        id: test-matrix
        uses: ./get-test-matrix
        with:
          user-agent: minecraft-actions-ci
          gradle-properties: test/fixtures/gradle.properties

      - name: Check get-test-matrix output (1.x scheme)
        run: |
          echo '${{ steps.test-matrix.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-test-matrix against fixture (new scheme, w/ patch)
        id: test-matrix-new-scheme
        uses: ./get-test-matrix
        with:
          user-agent: minecraft-actions-ci
          gradle-properties: test/fixtures/gradle-new-scheme.properties

      - name: Check get-test-matrix output (new scheme, w/ patch)
        run: |
          echo '${{ steps.test-matrix-new-scheme.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-test-matrix against fixture (new scheme, no patch)
        id: test-matrix-new-scheme-no-patch
        uses: ./get-test-matrix
        with:
          user-agent: minecraft-actions-ci
          gradle-properties: test/fixtures/gradle-new-scheme-no-patch.properties

      - name: Check get-test-matrix output (new scheme, no patch)
        run: |
          echo '${{ steps.test-matrix-new-scheme-no-patch.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-update-versions against fixture (1.x scheme)
        id: update-versions
        uses: ./get-update-versions
        with:
          minecraft-version: 1.21.4
          user-agent: minecraft-actions-ci

      - name: Check get-update-versions outputs (1.x scheme)
        run: |
          test -n "${{ steps.update-versions.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions.outputs.neoform-version }}"

      - name: Run get-update-versions against fixture (new scheme, w/ patch)
        id: update-versions-new-scheme
        uses: ./get-update-versions
        with:
          minecraft-version: 26.1.2
          user-agent: minecraft-actions-ci

      - name: Check get-update-versions outputs (new scheme, w/ patch)
        run: |
          test -n "${{ steps.update-versions-new-scheme.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.neoform-version }}"

      - name: Run get-update-versions against fixture (new scheme, no patch)
        id: update-versions-new-scheme-no-patch
        uses: ./get-update-versions
        with:
          minecraft-version: 26.2
          user-agent: minecraft-actions-ci

      - name: Check get-update-versions outputs (new scheme, no patch)
        run: |
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.neoform-version }}"

  test-mc-server:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: vanilla
            port: 25565
            rconPort: 25575
          - loader: fabric
            port: 25566
            rconPort: 25576
          - loader: neoforge
            port: 25567
            rconPort: 25577
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Resolve latest Minecraft version for server smoke test
        id: mc-versions
        uses: ./get-update-versions
        with:
          user-agent: minecraft-actions-ci

      - name: Set up JDK for Minecraft server
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.mc-versions.outputs.java-version }}

      - name: Set up Minecraft server
        id: setup-server
        uses: ./setup-mc-server
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          loader: ${{ matrix.loader }}
          user-agent: minecraft-actions-ci
          server-directory: mc-server
          accept-eula: "true"
          server-properties: |
            server-port=${{ matrix.port }}
            rcon.port=${{ matrix.rconPort }}

      - name: Check setup-mc-server Fabric outputs
        if: matrix.loader == 'fabric'
        run: |
          test -n "${{ steps.setup-server.outputs.fabric-loader-version }}"
          test -n "${{ steps.setup-server.outputs.fabric-installer-version }}"

      - name: Check setup-mc-server NeoForge outputs
        if: matrix.loader == 'neoforge'
        run: |
          test -n "${{ steps.setup-server.outputs.neoforge-version }}"

      - name: Run Minecraft server
        id: run-server
        uses: ./run-mc-server
        with:
          server-directory: mc-server
          timeout-seconds: "120"

      - name: Check run-mc-server outputs and reachability
        run: |
          test -n "${{ steps.run-server.outputs.pid }}"
          timeout 5 bash -c '</dev/tcp/127.0.0.1/${{ matrix.port }}' && echo "Server port is open"

  test-mc-client:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Resolve latest Minecraft version for client smoke test
        id: mc-versions
        uses: ./get-update-versions
        with:
          user-agent: minecraft-actions-ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.mc-versions.outputs.java-version }}

      - name: Install Xvfb and Mesa software renderer
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils

      - name: Set up Minecraft server
        id: setup-server
        uses: ./setup-mc-server
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          loader: vanilla
          user-agent: minecraft-actions-ci
          server-directory: mc-server
          accept-eula: "true"
          server-properties: |
            server-port=25568
            rcon.port=25578

      - name: Run Minecraft server
        id: run-server
        uses: ./run-mc-server
        with:
          server-directory: mc-server
          timeout-seconds: "120"

      - name: Set up Minecraft client
        id: setup-client
        uses: ./setup-mc-client
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          user-agent: minecraft-actions-ci
          client-directory: mc-client

      - name: Run Minecraft client (join server)
        id: run-client
        uses: ./run-mc-client
        with:
          client-directory: mc-client
          server-address: 127.0.0.1:25568
          timeout-seconds: "180"

      - name: Check run-mc-client outputs
        run: |
          test -n "${{ steps.run-client.outputs.pid }}"
