name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit test
        run: npm test

      - name: Upload built actions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            get-test-matrix/dist
            get-update-versions/dist
            setup-mod-gradle/resolve-java/dist
            setup-mc-server/dist
            run-mc-server/dist
            setup-mc-client/dist
            run-mc-client/dist
            setup-packwiz/dist
            unpack-mrpack/dist
            packwiz-update-pack/dist
            check-fabric-conflicts/dist
            packwiz-install-versions/dist

  test-version-actions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - name: Run get-test-matrix against fixture (1.x scheme)
        id: test-matrix
        uses: ./get-test-matrix
        with:
          gradle-properties: test/fixtures/gradle.properties

      - name: Check get-test-matrix output (1.x scheme)
        run: |
          echo '${{ steps.test-matrix.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-test-matrix against fixture (new scheme, w/ patch)
        id: test-matrix-new-scheme
        uses: ./get-test-matrix
        with:
          gradle-properties: test/fixtures/gradle-new-scheme.properties

      - name: Check get-test-matrix output (new scheme, w/ patch)
        run: |
          echo '${{ steps.test-matrix-new-scheme.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-test-matrix against fixture (new scheme, no patch)
        id: test-matrix-new-scheme-no-patch
        uses: ./get-test-matrix
        with:
          gradle-properties: test/fixtures/gradle-new-scheme-no-patch.properties

      - name: Check get-test-matrix output (new scheme, no patch)
        run: |
          echo '${{ steps.test-matrix-new-scheme-no-patch.outputs.test-matrix }}' | jq -e 'length > 0'

      - name: Run get-update-versions against fixture (1.x scheme)
        id: update-versions
        uses: ./get-update-versions
        with:
          minecraft-version: 1.21.4

      - name: Check get-update-versions outputs (1.x scheme)
        run: |
          test -n "${{ steps.update-versions.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions.outputs.neoform-version }}"

      - name: Run get-update-versions against fixture (new scheme, w/ patch)
        id: update-versions-new-scheme
        uses: ./get-update-versions
        with:
          minecraft-version: 26.1.2

      - name: Check get-update-versions outputs (new scheme, w/ patch)
        run: |
          test -n "${{ steps.update-versions-new-scheme.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions-new-scheme.outputs.neoform-version }}"

      - name: Run get-update-versions against fixture (new scheme, no patch)
        id: update-versions-new-scheme-no-patch
        uses: ./get-update-versions
        with:
          minecraft-version: 26.2

      - name: Check get-update-versions outputs (new scheme, no patch)
        run: |
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.fabric-loader-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.fabric-api-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.neoforge-version }}"
          test -n "${{ steps.update-versions-new-scheme-no-patch.outputs.neoform-version }}"

  test-mc-server:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: vanilla
            port: 25565
            rconPort: 25575
          - loader: fabric
            port: 25566
            rconPort: 25576
          - loader: neoforge
            port: 25567
            rconPort: 25577
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - name: Resolve latest Minecraft version for server smoke test
        id: mc-versions
        uses: ./get-update-versions

      - name: Set up JDK for Minecraft server
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.mc-versions.outputs.java-version }}

      - name: Set up Minecraft server
        id: setup-server
        uses: ./setup-mc-server
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          loader: ${{ matrix.loader }}
          server-directory: mc-server
          accept-eula: "true"
          server-properties: |
            server-port=${{ matrix.port }}
            rcon.port=${{ matrix.rconPort }}

      - name: Check setup-mc-server Fabric outputs
        if: matrix.loader == 'fabric'
        run: |
          test -n "${{ steps.setup-server.outputs.fabric-loader-version }}"
          test -n "${{ steps.setup-server.outputs.fabric-installer-version }}"

      - name: Check setup-mc-server NeoForge outputs
        if: matrix.loader == 'neoforge'
        run: |
          test -n "${{ steps.setup-server.outputs.neoforge-version }}"

      - name: Run Minecraft server
        id: run-server
        uses: ./run-mc-server
        with:
          server-directory: mc-server
          timeout-seconds: "120"

      - name: Check run-mc-server outputs and reachability
        run: |
          test -n "${{ steps.run-server.outputs.pid }}"
          timeout 5 bash -c '</dev/tcp/127.0.0.1/${{ matrix.port }}' && echo "Server port is open"

  test-mc-client:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: vanilla
            port: 25568
            rconPort: 25578
          - loader: fabric
            port: 25569
            rconPort: 25579
          - loader: neoforge
            port: 25570
            rconPort: 25580
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - name: Resolve latest Minecraft version for client smoke test
        id: mc-versions
        uses: ./get-update-versions

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.mc-versions.outputs.java-version }}

      - name: Install Xvfb and Mesa software renderer
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils

      - name: Set up Minecraft server
        id: setup-server
        uses: ./setup-mc-server
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          loader: vanilla
          server-directory: mc-server
          accept-eula: "true"
          server-properties: |
            server-port=${{ matrix.port }}
            rcon.port=${{ matrix.rconPort }}

      - name: Run Minecraft server
        id: run-server
        uses: ./run-mc-server
        with:
          server-directory: mc-server
          timeout-seconds: "120"

      - name: Set up Minecraft client
        id: setup-client
        uses: ./setup-mc-client
        with:
          minecraft-version: ${{ steps.mc-versions.outputs.minecraft-version }}
          loader: ${{ matrix.loader }}
          client-directory: mc-client

      - name: Check setup-mc-client Fabric outputs
        if: matrix.loader == 'fabric'
        run: |
          test -n "${{ steps.setup-client.outputs.fabric-loader-version }}"

      - name: Check setup-mc-client NeoForge outputs
        if: matrix.loader == 'neoforge'
        run: |
          test -n "${{ steps.setup-client.outputs.neoforge-version }}"

      - name: Run Minecraft client (join server)
        id: run-client
        uses: ./run-mc-client
        with:
          client-directory: mc-client
          server-address: 127.0.0.1:${{ matrix.port }}
          timeout-seconds: "180"

      - name: Check run-mc-client outputs
        run: |
          test -n "${{ steps.run-client.outputs.pid }}"

  test-setup-packwiz:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Set up Packwiz
        id: setup-packwiz
        uses: ./setup-packwiz

      - name: Check setup-packwiz output and binary
        run: |
          test -n "${{ steps.setup-packwiz.outputs.packwiz-path }}"
          packwiz --help

      - name: Set up Packwiz again (exercise tool-cache/repeat-install path)
        id: setup-packwiz-again
        uses: ./setup-packwiz

      - name: Check setup-packwiz output and binary (second run)
        run: |
          test -n "${{ steps.setup-packwiz-again.outputs.packwiz-path }}"
          packwiz --help

  test-unpack-mrpack:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [client, server]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - name: Unpack fixture mrpack
        id: unpack
        uses: ./unpack-mrpack
        with:
          mrpack-file: test/fixtures/example.mrpack
          minecraft-directory: mc-instance-${{ matrix.environment }}
          environment: ${{ matrix.environment }}

      - name: Check outputs and unpacked files
        run: |
          test "${{ steps.unpack.outputs.minecraft-directory }}" = "mc-instance-${{ matrix.environment }}"
          test "${{ steps.unpack.outputs.minecraft-version }}" = "1.21.4"
          test -f "mc-instance-${{ matrix.environment }}/mods/shared-mod.txt"
          test -f "mc-instance-${{ matrix.environment }}/config/base.txt"
          test -f "mc-instance-${{ matrix.environment }}/config/${{ matrix.environment }}-only.txt"

      - name: Check environment-specific file is skipped on the client
        if: matrix.environment == 'client'
        run: |
          test ! -f "mc-instance-client/mods/server-mod.txt"

      - name: Check environment-specific file is downloaded on the server
        if: matrix.environment == 'server'
        run: |
          test -f "mc-instance-server/mods/server-mod.txt"

  test-packwiz-mod-update-actions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: .

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Set up Packwiz
        uses: ./setup-packwiz

      - name: Initialise a scratch pack and pin Sodium to a stale version
        run: |
          mkdir -p scratch-pack
          cd scratch-pack
          packwiz init --name scratch --author ci --version 1.0.0 --mc-version 1.21.1 --modloader fabric -y
          # Deliberately stale: a real, known-old Sodium 1.21.1 build, verified against the live Modrinth API.
          packwiz modrinth add --project-id AANobbMI --version-id RncWhTxD --yes
          sed -i 's/fabric = ".*"/fabric = "0.15.0"/' pack.toml

      - name: Run packwiz-update-pack
        id: update-pack
        uses: ./packwiz-update-pack
        with:
          working-directory: scratch-pack

      - name: Check packwiz-update-pack outputs
        run: |
          test "${{ steps.update-pack.outputs.has-update }}" = "true"
          echo '${{ steps.update-pack.outputs.updated-mods }}' | jq -e 'length > 0'
          echo '${{ steps.update-pack.outputs.loader-update }}' | jq -e '.name == "Fabric"'

      - name: Run check-fabric-conflicts
        id: check-conflicts
        uses: ./check-fabric-conflicts
        with:
          working-directory: scratch-pack
          minecraft-version: "1.21.1"
          loader: fabric

      - name: Check check-fabric-conflicts outputs are well-formed
        run: |
          # Whether a real conflict exists depends on live Modrinth state, so only the
          # shape is asserted here - the pure conflict-resolution logic itself is covered
          # by fixture-based unit tests.
          echo '${{ steps.check-conflicts.outputs.has-conflicts }}' | grep -Eq '^(true|false)$'
          echo '${{ steps.check-conflicts.outputs.conflicts }}' | jq -e 'type == "array"'

      - name: Run packwiz-install-versions to pin Sodium back to the known-old version
        uses: ./packwiz-install-versions
        with:
          working-directory: scratch-pack
          versions: '[{"platform":"modrinth","mod":"AANobbMI","version":"RncWhTxD"}]'

      - name: Check packwiz-install-versions applied the pin
        run: |
          grep -q 'version = "RncWhTxD"' scratch-pack/mods/sodium.pw.toml
