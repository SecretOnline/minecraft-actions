name: Setup Minecraft mod Gradle
description: >-
  Sets up Java and Gradle for building Minecraft mods.
  Ensures the Gradle wrapper is executable, validates it, sets up the correct Java version, and configures Gradle.

inputs:
  java-version:
    description: >-
      Java version to use. If not set, reads java_version from the gradle.properties file.
    required: false
  gradle-properties:
    description: Path to the gradle.properties file.
    required: false
    default: gradle.properties

outputs:
  java-version:
    description: The Java version that was set up.
    value: ${{ steps.resolve-java.outputs.java-version }}
  java-path:
    description: Path to the Java installation (from setup-java).
    value: ${{ steps.setup-java.outputs.path }}

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ github.action_path }}/../.node-version

    - name: Resolve Java version
      id: resolve-java
      shell: bash
      # `uses:` local paths (relative or via github.action_path) resolve against the runner's $GITHUB_WORKSPACE
      env:
        INPUT_java-version: ${{ inputs.java-version }}
        INPUT_gradle-properties: ${{ inputs.gradle-properties }}
      run: node "${{ github.action_path }}/resolve-java/dist/index.js"

    - name: Ensure Gradle wrapper is executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup Java ${{ steps.resolve-java.outputs.java-version }}
      id: setup-java
      uses: actions/setup-java@v5
      with:
        java-version: ${{ steps.resolve-java.outputs.java-version }}
        distribution: zulu

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
