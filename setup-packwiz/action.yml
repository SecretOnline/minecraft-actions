name: Setup Packwiz
description: >-
  Installs the Packwiz CLI (https://github.com/packwiz/packwiz) onto PATH. Tries a Linux
  binary built by packwiz's own CI via nightly.link first, falls back to a previously
  cached build, and as a last resort builds packwiz from source with `go install`
  (requires Go already on PATH, e.g. via actions/setup-go), caching that build for future
  runs. Linux runners only. There is no way to pin a specific packwiz version - the
  nightly.link artifact always reflects packwiz's main branch, and the source-build
  fallback always builds @latest.

outputs:
  packwiz-path:
    description: Absolute path to the installed packwiz binary.

runs:
  using: node24
  main: dist/index.js
